name: CI

on:
  push:
    branches: [master]
  pull_request:

# Cancel an in-progress run if a newer commit is pushed to the same branch/PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: ruff (lint + format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install ruff
        run: pip install "ruff>=0.4"
      - name: ruff check
        run: ruff check .
      - name: ruff format --check
        run: ruff format --check .

  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package + dev deps (CPU torch)
        # CPU wheel for torch keeps the install lean (~750MB vs CUDA's ~3GB).
        run: |
          pip install --upgrade pip
          pip install --extra-index-url https://download.pytorch.org/whl/cpu \
            -e ".[dev]"
      - name: pytest
        # The test_training_smoke tests fit LR / GBM / MLP end-to-end on
        # synthetic fixtures, so this also functions as the 1-epoch
        # training smoke required by P2.
        run: pytest -q
