model_type: gbm
seed: 42
data:
  path: Processed_data/df_model_final.csv
  split:
    train: 0.70
    val: 0.15
    test: 0.15
params:
  n_estimators: 500
  learning_rate: 0.05
  num_leaves: 63
  min_child_samples: 20
threshold:
  policy: top_k
  top_k_fraction: 0.10
mlflow_experiment: musicbox_churn
